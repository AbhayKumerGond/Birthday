<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Sanskriti ❤</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  color:white;
  overflow-x:hidden;
  background:#0f051d;
}

/* ANIMATED BG */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
  background: linear-gradient(120deg, #ff9a9e, #a18cd1, #ffdde1, #c471f5);
  background-size: 400% 400%;
  animation: gradientMove 15s ease infinite;
  filter: blur(80px);
}

.bg::before,.bg::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
  animation: float 12s infinite ease-in-out;
}

.bg::after{left:60%;animation-delay:6s;}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(80px);}
  100%{transform:translateY(0);}
}

/* HEART FALL */
.heart{
  position:fixed;
  top:-10px;
  font-size:20px;
  animation: fall linear infinite;
  z-index:999;
}

@keyframes fall{
  to{transform:translateY(100vh);}
}

/* CURSOR */
#cursorCanvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
  z-index:9999;
}

/* SECTIONS */
section{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:40px;
  border-radius:20px;
  max-width:500px;
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 0 40px rgba(255,100,200,0.2);
}

/* TEXT */
.blur-text{
  opacity:0;
  filter:blur(20px);
  transform:translateY(50px);
}

h1{
  font-size:2.8rem;
  margin-bottom:20px;
  line-height:1.3;
}

p{
  font-size:1.2rem;
  line-height:1.6;
}

/* GALLERY */
.gallery{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
}

.gallery img{
  width:150px;
  border-radius:15px;
  opacity:0;
  transform:scale(0.8);
}

/* BUTTON */
button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff6b6b;
  color:white;
  cursor:pointer;
  margin-top:20px;
}

@media(max-width:600px){
  h1{font-size:2rem;}
}
</style>

</head>

<body>

<div class="bg"></div>
<canvas id="cursorCanvas"></canvas>

<!-- HEART SCRIPT -->

<script>
function createHeart(){
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=(Math.random()*3+3)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
}
setInterval(createHeart,300);
</script>

<!-- HERO -->

<section>
  <div class="card">
    <h1 class="blur-text">Happy Birthday Sanskriti ❤</h1>
    <p class="blur-text">You are my happiness, my peace, my everything.</p>
  </div>
</section>

<!-- MESSAGE -->

<section>
  <div class="card">
    <h1 class="blur-text">My Love Letter ❤</h1>
    <p class="blur-text">
      From the day I met you, everything became magical...
      You are the best thing that ever happened to me.
    </p>
  </div>
</section>

<!-- GALLERY -->

<section>
  <div class="card">
    <h1 class="blur-text">Our Memories ❤</h1>
    <div class="gallery">
      <img src="../images/YOUR_IMAGE_1.jpg.jpeg">
      <img src="../images/YOUR_IMAGE_2.jpg.jpeg">
      <img src="../images/YOUR_IMAGE_3.jpg.jpeg">
    </div>
  </div>
</section>

<!-- CAKE -->

<section>
  <div class="card">
    <h1 class="blur-text">Cut the Cake 🎂</h1>
    <button onclick="alert('Happy Birthday My Love ❤')">Cut Cake</button>
  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

/* TEXT ANIMATION */
gsap.utils.toArray(".blur-text").forEach(el=>{
  gsap.to(el,{
    opacity:1,
    y:0,
    filter:"blur(0px)",
    duration:1.3,
    ease:"power4.out",
    scrollTrigger:{
      trigger:el,
      start:"top 85%"
    }
  });
});

/* IMAGE ANIMATION */
gsap.to(".gallery img",{
  scale:1,
  opacity:1,
  stagger:0.3,
  duration:1,
  scrollTrigger:{
    trigger:".gallery",
    start:"top 80%"
  }
});

/* CURSOR */
const canvas=document.getElementById("cursorCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function addParticles(x,y){
  particles.push({x,y,size:10,alpha:1});
}

window.addEventListener("mousemove",e=>addParticles(e.clientX,e.clientY));
window.addEventListener("touchmove",e=>{
  let t=e.touches[0];
  addParticles(t.clientX,t.clientY);
});

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,i)=>{
    p.alpha-=0.02;
    p.size*=0.95;

    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
    g.addColorStop(0,`rgba(255,150,200,${p.alpha})`);
    g.addColorStop(1,"transparent");

    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();

    if(p.alpha<=0) particles.splice(i,1);
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
